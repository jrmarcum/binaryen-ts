# JSR publish with OIDC provenance.
#
# Triggered when a git tag matching `v*` is pushed (e.g. `git tag v1.0.0 && git push --tags`).
# The workflow runs `deno task publish`, which delegates to `deno publish`. JSR detects the
# GitHub Actions OIDC token and stamps the release with provenance automatically.
#
# Required permissions:
#   - id-token: write   → OIDC token for JSR provenance
#   - contents: write   → checkout + create GitHub Release after publish
#
# JSR side: link the package (`@jrmarcum/binaryen-ts`) to this GitHub repo in the JSR UI
# under "Settings → GitHub Actions". No JSR token is needed when OIDC is configured.

name: Publish to JSR

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    name: Publish ${{ github.ref_name }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Verify deno.json version matches tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(deno eval 'console.log(JSON.parse(Deno.readTextFileSync("deno.json")).version)')"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match deno.json version ($PKG_VERSION)"
            exit 1
          fi
          echo "Versions match: $TAG_VERSION"

      - name: Type-check
        run: deno task check

      - name: Test
        run: deno task test

      - name: Publish to JSR (with provenance)
        run: deno task publish

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "binaryen-ts $GITHUB_REF_NAME" \
            --generate-notes \
            --verify-tag
